# alembic.ini — Alembic configuration for MythosEngine
#
# Usage:
#   alembic upgrade head        — apply all pending migrations
#   alembic downgrade -1        — roll back the last migration
#   alembic revision --autogenerate -m "describe change"  — generate a new migration
#   alembic history             — show applied/pending history
#
# The database URL is resolved in migrations/env.py.
# Override it by setting the DATABASE_URL environment variable, e.g.:
#   DATABASE_URL=sqlite:////absolute/path/to/mythos_engine.db alembic upgrade head

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Fallback URL — env.py will prefer the DATABASE_URL env var if set.
sqlalchemy.url = sqlite:///mythos_engine.db

[post_write_hooks]
# (none configured)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
